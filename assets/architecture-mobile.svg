<!-- Hallmark · pre-emit critique: P5 H5 E5 S5 R5 V5 -->
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1080" viewBox="0 0 720 1080" role="img" aria-labelledby="title description">
  <title id="title">DesignRail system architecture for narrow screens</title>
  <desc id="description">A stacked four-stage flow from mock design input through deterministic evaluation and GraphQL-backed human review to an authorized or locked export.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--color-subtle)" />
    </marker>
    <style>
      :root {
        --color-canvas: #070a0b;
        --color-shell: #0b1011;
        --color-panel: #111719;
        --color-accent-soft: #0f3032;
        --color-danger-soft: #241416;
        --color-border: #263338;
        --color-border-strong: #35464d;
        --color-text: #eef6f5;
        --color-muted: #a6b5b4;
        --color-subtle: #728584;
        --color-accent: #32d3c4;
        --color-success: #35b779;
        --color-danger: #ef6464;
        --font-ui: ui-sans-serif, system-ui, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .stage { fill: var(--color-shell); stroke: var(--color-border); stroke-width: 1.5; }
      .node { fill: var(--color-panel); stroke: var(--color-border-strong); stroke-width: 1.5; }
      .node-accent { fill: var(--color-accent-soft); stroke: var(--color-accent); stroke-width: 2; }
      .node-danger { fill: var(--color-danger-soft); stroke: var(--color-danger); stroke-width: 1.5; }
      .stage-label { fill: var(--color-subtle); font: 600 16px var(--font-mono); letter-spacing: 1.5px; }
      .node-title { fill: var(--color-text); font: 600 20px var(--font-ui); }
      .node-detail { fill: var(--color-muted); font: 400 16px var(--font-ui); }
      .connector { fill: none; stroke: var(--color-subtle); stroke-width: 2; marker-end: url(#arrow); }
      .connector-accent { fill: none; stroke: var(--color-accent); stroke-width: 2.5; marker-end: url(#arrow); }
      .connector-danger { fill: none; stroke: var(--color-danger); stroke-width: 2; marker-end: url(#arrow); }
      .footer { fill: var(--color-muted); font: 500 16px var(--font-ui); }
    </style>
  </defs>

  <rect width="720" height="1080" rx="18" fill="var(--color-canvas)" />
  <text x="36" y="48" class="node-title" font-size="26">From intent to an authorized export</text>
  <text x="36" y="76" class="node-detail">The human gate owns export authority.</text>

  <rect x="28" y="102" width="664" height="190" rx="12" class="stage" />
  <text x="48" y="134" class="stage-label">01 · NORMALIZE</text>
  <rect x="48" y="154" width="278" height="108" rx="9" class="node" />
  <text x="68" y="195" class="node-title">Mock Figma fixture</text>
  <text x="68" y="225" class="node-detail">Public-safe by default</text>
  <path d="M326 208 H374" class="connector" />
  <rect x="374" y="154" width="298" height="108" rx="9" class="node" />
  <text x="394" y="195" class="node-title">ComponentIntent</text>
  <text x="394" y="225" class="node-detail">Semantics, states, tokens, a11y</text>

  <path d="M523 292 V328" class="connector" />

  <rect x="28" y="328" width="664" height="190" rx="12" class="stage" />
  <text x="48" y="360" class="stage-label">02 · EVALUATE</text>
  <rect x="48" y="380" width="278" height="108" rx="9" class="node" />
  <text x="68" y="421" class="node-title">Schema mapper</text>
  <text x="68" y="451" class="node-detail">Shoelace proposal</text>
  <path d="M326 434 H374" class="connector" />
  <rect x="374" y="380" width="298" height="108" rx="9" class="node" />
  <text x="394" y="421" class="node-title">Compliance review</text>
  <text x="394" y="451" class="node-detail">Severity, cause, remediation</text>

  <path d="M523 518 V554" class="connector" />

  <rect x="28" y="554" width="664" height="190" rx="12" class="stage" />
  <text x="48" y="586" class="stage-label">03 · REVIEW</text>
  <rect x="48" y="606" width="278" height="108" rx="9" class="node" />
  <text x="68" y="647" class="node-title">GraphQL + SQLite</text>
  <text x="68" y="677" class="node-detail">Typed review contract</text>
  <path d="M326 646 H374" class="connector-accent" />
  <path d="M374 674 H326" class="connector-accent" />
  <rect x="374" y="606" width="298" height="108" rx="9" class="node-accent" />
  <text x="394" y="647" class="node-title">Review console</text>
  <text x="394" y="677" class="node-detail">Compare, decide, audit</text>

  <path d="M523 744 V780" class="connector-accent" />

  <rect x="28" y="780" width="664" height="230" rx="12" class="stage" />
  <text x="48" y="812" class="stage-label">04 · AUTHORIZE</text>
  <rect x="48" y="832" width="278" height="126" rx="9" class="node-accent" />
  <text x="68" y="877" class="node-title">Human decision</text>
  <text x="68" y="907" class="node-detail">Accept · edit · reject</text>
  <path d="M326 866 H374" class="connector-accent" />
  <path d="M326 930 H374" class="connector-danger" />
  <rect x="374" y="824" width="298" height="82" rx="9" class="node" />
  <circle cx="397" cy="852" r="5" fill="var(--color-success)" />
  <text x="412" y="858" class="node-title">Accepted or edited</text>
  <text x="394" y="884" class="node-detail">HTML · React · Agent Brief</text>
  <rect x="374" y="920" width="298" height="70" rx="9" class="node-danger" />
  <circle cx="397" cy="946" r="5" fill="var(--color-danger)" />
  <text x="412" y="952" class="node-title">Rejected</text>
  <text x="394" y="976" class="node-detail">Export stays locked</text>

  <line x1="36" y1="1038" x2="684" y2="1038" stroke="var(--color-border)" stroke-width="1" />
  <text x="36" y="1065" class="footer">Fixture-backed by default · GraphQL is the contract</text>
</svg>
