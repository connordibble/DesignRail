name: Feature request
description: Propose a change to the review workflow, pipeline, schema coverage, or docs.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What handoff or review problem does this solve? Why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Sketch the change. Note any impact on the GraphQL contract, persistence, design tokens, or the mock-mode default.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? Keep the credential-free default intact and `pnpm check` green.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Relevant files, ADRs, or DESIGN.md / AGENTS.md sections.
    validations:
      required: false
